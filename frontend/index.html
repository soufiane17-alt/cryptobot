<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CryptoBot Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: system-ui, sans-serif; background: #0a0a0a; color: #f1f1f1; }
        .live { animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-100 min-h-screen p-6">
    <div class="max-w-5xl mx-auto">
        <div class="flex items-center justify-between mb-8">
            <div class="flex items-center gap-3">
                <div class="w-9 h-9 bg-emerald-500 rounded-2xl flex items-center justify-center text-2xl">🤖</div>
                <h1 class="text-3xl font-bold">CryptoBot</h1>
            </div>
            <div class="flex items-center gap-2 text-emerald-400">
                <div class="w-3 h-3 bg-emerald-400 rounded-full live"></div>
                <span class="font-medium">LIVE • EN DIRECT</span>
            </div>
        </div>

        <!-- Prix en live -->
        <div class="mb-8">
            <h2 class="text-zinc-400 text-sm mb-3">PRIX EN LIVE</h2>
            <div id="prices" class="grid grid-cols-3 gap-4"></div>
        </div>

        <!-- Derniers signaux -->
        <div>
            <h2 class="text-zinc-400 text-sm mb-3">DERNIERS SIGNAUX</h2>
            <div id="signals" class="space-y-3"></div>
        </div>
    </div>

    <script>
        async function update() {
            try {
                const res = await fetch('/api/status');
                const data = await res.json();

                // Prix
                document.getElementById('prices').innerHTML = `
                    <div class="bg-zinc-900 rounded-2xl p-5">
                        <div class="text-zinc-400 text-xs">BTC/USDT</div>
                        <div class="text-3xl font-semibold text-emerald-400">$${data.btc_price}</div>
                    </div>
                    <div class="bg-zinc-900 rounded-2xl p-5">
                        <div class="text-zinc-400 text-xs">ETH/USDT</div>
                        <div class="text-3xl font-semibold text-emerald-400">$${data.eth_price}</div>
                    </div>
                    <div class="bg-zinc-900 rounded-2xl p-5">
                        <div class="text-zinc-400 text-xs">SOL/USDT</div>
                        <div class="text-3xl font-semibold text-emerald-400">$${data.sol_price}</div>
                    </div>
                `;

                // Signaux
                let html = '';
                data.recent_signals.forEach(s => {
                    const color = s.signal === 'BUY' ? 'text-emerald-400' : s.signal === 'SELL' ? 'text-red-400' : 'text-zinc-400';
                    html += `
                        <div class="bg-zinc-900 rounded-2xl p-4 flex justify-between items-center">
                            <div>
                                <span class="${color} font-bold">${s.signal}</span>
                                <span class="ml-3">${s.symbol}</span>
                            </div>
                            <div class="text-right">
                                <div class="text-sm">RSI ${s.rsi}</div>
                                <div class="text-xs text-zinc-500">${s.reason}</div>
                            </div>
                        </div>
                    `;
                });
                document.getElementById('signals').innerHTML = html || '<p class="text-zinc-500">Aucun signal pour le moment</p>';

            } catch(e) {
                console.log("Erreur de connexion");
            }
        }

        setInterval(update, 3000);
        update();
    </script>
</body>
</html>
