<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CryptoBot — Dashboard Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', system-ui, sans-serif; }
        .live-dot { animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-100 min-h-screen">
    <div class="max-w-7xl mx-auto p-6">
        <div class="flex justify-between items-center mb-8">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-emerald-500 rounded-2xl flex items-center justify-center text-3xl">🤖</div>
                <h1 class="text-4xl font-semibold tracking-tight">CryptoBot</h1>
            </div>
            <div class="flex items-center gap-3 bg-zinc-900 px-5 py-2.5 rounded-3xl border border-emerald-500/30">
                <div class="w-3 h-3 bg-emerald-400 rounded-full live-dot"></div>
                <span class="text-emerald-400 font-semibold">LIVE • 24/7 sur Railway</span>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
            <!-- Prix en live -->
            <div class="lg:col-span-3 bg-zinc-900 rounded-3xl p-6 border border-zinc-800">
                <h2 class="text-zinc-400 text-sm font-medium mb-6">PRIX EN LIVE</h2>
                <div id="prices" class="space-y-8"></div>
            </div>

            <!-- Graphiques -->
            <div class="lg:col-span-9 bg-zinc-900 rounded-3xl p-6 border border-zinc-800">
                <h2 class="text-zinc-400 text-sm font-medium mb-4">ÉVOLUTION DES PRIX</h2>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4" id="charts"></div>
            </div>

            <!-- Derniers signaux -->
            <div class="lg:col-span-12 bg-zinc-900 rounded-3xl p-6 border border-zinc-800">
                <h2 class="text-zinc-400 text-sm font-medium mb-4">DERNIERS SIGNAUX</h2>
                <div id="signals" class="grid grid-cols-1 md:grid-cols-3 gap-4"></div>
            </div>
        </div>
    </div>

    <script>
        async function updateDashboard() {
            try {
                const res = await fetch('/api/status');
                const data = await res.json();

                // Prix en live
                let pricesHTML = `
                    <div class="flex justify-between"><span class="text-zinc-400">BTC/USDT</span><span class="text-3xl font-semibold text-emerald-400">$${data.btc_price}</span></div>
                    <div class="flex justify-between"><span class="text-zinc-400">ETH/USDT</span><span class="text-3xl font-semibold text-emerald-400">$${data.eth_price}</span></div>
                    <div class="flex justify-between"><span class="text-zinc-400">SOL/USDT</span><span class="text-3xl font-semibold text-emerald-400">$${data.sol_price}</span></div>
                `;
                document.getElementById('prices').innerHTML = pricesHTML;

                // Signaux
                let signalsHTML = '';
                data.recent_signals.forEach(s => {
                    const color = s.signal === 'BUY' ? 'text-emerald-400' : s.signal === 'SELL' ? 'text-red-400' : 'text-zinc-400';
                    signalsHTML += `
                        <div class="bg-zinc-800 rounded-2xl p-4">
                            <div class="flex justify-between items-start">
                                <div>
                                    <span class="${color} font-bold text-xl">${s.signal}</span>
                                    <span class="ml-2 text-zinc-300">${s.symbol}</span>
                                </div>
                                <div class="text-right text-sm">
                                    <div>RSI ${s.rsi}</div>
                                    <div class="text-zinc-500 text-xs">${s.reason}</div>
                                </div>
                            </div>
                        </div>
                    `;
                });
                document.getElementById('signals').innerHTML = signalsHTML || '<p class="text-zinc-500">Aucun signal pour le moment</p>';

            } catch(e) { console.log("Erreur de mise à jour"); }
        }

        // Mise à jour toutes les 2 secondes
        setInterval(updateDashboard, 2000);
        updateDashboard();
    </script>
</body>
</html>
