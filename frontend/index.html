<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CryptoBot — Dashboard Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', system-ui, sans-serif; }
        .live-dot { animation: livePulse 1.8s infinite; }
        @keyframes livePulse { 0%,100% { opacity: 1; } 50% { opacity: 0.25; } }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-100 min-h-screen">
    <div class="max-w-5xl mx-auto p-8">
        <div class="flex items-center justify-between mb-10">
            <div class="flex items-center gap-3">
                <div class="w-9 h-9 bg-emerald-500 rounded-2xl flex items-center justify-center text-2xl">🤖</div>
                <h1 class="text-3xl font-semibold tracking-tight">CryptoBot</h1>
            </div>
            <div class="flex items-center gap-2 px-4 py-2 bg-zinc-900 rounded-3xl border border-emerald-500/30">
                <div class="w-3 h-3 bg-emerald-400 rounded-full live-dot"></div>
                <span class="text-emerald-400 text-sm font-semibold tracking-widest">LIVE • EN TEMPS RÉEL</span>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <!-- Prix en live -->
            <div class="bg-zinc-900 rounded-3xl p-7 border border-zinc-800">
                <h2 class="text-zinc-400 text-sm font-medium mb-5 tracking-wider">PRIX EN LIVE</h2>
                <div id="prices" class="space-y-7"></div>
            </div>

            <!-- Derniers signaux -->
            <div class="md:col-span-2 bg-zinc-900 rounded-3xl p-7 border border-zinc-800">
                <h2 class="text-zinc-400 text-sm font-medium mb-5 tracking-wider">DERNIERS SIGNAUX</h2>
                <div id="signals" class="space-y-4"></div>
            </div>
        </div>

        <div class="text-center text-zinc-500 text-xs mt-12 font-mono" id="last-update"></div>
    </div>

    <script>
        async function updateDashboard() {
            try {
                const res = await fetch('/api/status');
                const data = await res.json();

                // Prix
                let pricesHTML = `
                    <div class="flex justify-between items-baseline">
                        <span class="text-zinc-400">BTC/USDT</span>
                        <span class="text-4xl font-semibold text-emerald-400">$${data.btc_price}</span>
                    </div>
                    <div class="flex justify-between items-baseline">
                        <span class="text-zinc-400">ETH/USDT</span>
                        <span class="text-4xl font-semibold text-emerald-400">$${data.eth_price}</span>
                    </div>
                    <div class="flex justify-between items-baseline">
                        <span class="text-zinc-400">SOL/USDT</span>
                        <span class="text-4xl font-semibold text-emerald-400">$${data.sol_price}</span>
                    </div>
                `;
                document.getElementById('prices').innerHTML = pricesHTML;

                // Signaux
                let signalsHTML = '';
                data.recent_signals.forEach(s => {
                    const color = s.signal === 'BUY' ? 'text-emerald-400' : s.signal === 'SELL' ? 'text-red-400' : 'text-zinc-400';
                    signalsHTML += `
                        <div class="flex justify-between items-center bg-zinc-800 rounded-2xl px-6 py-5">
                            <div>
                                <span class="${color} font-semibold text-xl">${s.signal}</span>
                                <span class="ml-4 text-zinc-300">${s.symbol}</span>
                            </div>
                            <div class="text-right">
                                <div class="text-sm text-zinc-400">RSI ${s.rsi}</div>
                                <div class="text-xs text-zinc-500">${s.reason}</div>
                            </div>
                        </div>
                    `;
                });
                document.getElementById('signals').innerHTML = signalsHTML || '<p class="text-zinc-500 text-center py-8">Aucun signal pour le moment</p>';

                // Heure de mise à jour
                const date = new Date(data.last_update * 1000);
                document.getElementById('last-update').textContent = `Dernière mise à jour : ${date.toLocaleTimeString('fr-FR')}`;
            } catch (e) {}
        }

        // Mise à jour toutes les 2 secondes (fluide)
        setInterval(updateDashboard, 2000);
        updateDashboard();
    </script>
</body>
</html>
