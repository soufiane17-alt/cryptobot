<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CryptoBot Dashboard</title>
    <style>
        body { font-family: Arial, sans-serif; background: #0a0a0a; color: white; text-align: center; padding: 80px 20px; }
        h1 { font-size: 48px; margin-bottom: 20px; }
        .ok { color: #22c55e; font-size: 24px; }
    </style>
</head>
<body>
    <h1>🚀 CryptoBot</h1>
    <p class="ok">✅ Dashboard chargé avec succès</p>
    <p style="margin-top:40px; color:#666; font-size:15px;">Si tu vois ce message, le fichier HTML est bien servi par Railway.</p>
    
    <div style="margin-top:60px; background:#111; padding:20px; border-radius:8px; max-width:600px; margin-left:auto; margin-right:auto; font-family:monospace; font-size:13px; text-align:left;" id="debug">
        Chargement des données API...
    </div>

    <script>
        fetch('/api/status')
            .then(r => r.json())
            .then(d => {
                document.getElementById('debug').innerHTML = `
                    <strong>✅ API fonctionne</strong><br>
                    BTC: $${d.btc_price}<br>
                    ETH: $${d.eth_price}<br>
                    SOL: $${d.sol_price}<br><br>
                    Signaux : ${d.recent_signals.length} trouvés
                `;
            })
            .catch(() => {
                document.getElementById('debug').innerHTML = '❌ Impossible de joindre /api/status';
            });
    </script>
</body>
</html>
