<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CryptoBot Dashboard</title>
    <style>
        body { font-family: Arial, sans-serif; background: #0a0a0a; color: white; text-align: center; padding: 50px; }
        h1 { font-size: 48px; margin-bottom: 20px; }
        .status { font-size: 18px; color: #22c55e; }
    </style>
</head>
<body>
    <h1>🚀 CryptoBot</h1>
    <p class="status">Dashboard chargé avec succès ✅</p>
    <p style="margin-top:30px; color:#888; font-size:14px;">Si tu vois ce message, le fichier HTML est bien servi.</p>
    
    <div id="debug" style="margin-top:40px; text-align:left; max-width:600px; margin-left:auto; margin-right:auto; background:#111; padding:15px; border-radius:8px; font-family:monospace; font-size:13px;"></div>

    <script>
        document.getElementById('debug').innerHTML = `
            <strong>Test API :</strong><br>
            <span id="api-result">Chargement de /api/status...</span>
        `;
        fetch('/api/status')
            .then(r => r.json())
            .then(d => {
                document.getElementById('api-result').innerHTML = 
                    `✅ API OK<br>
                     BTC: $${d.btc_price}<br>
                     ETH: $${d.eth_price}<br>
                     SOL: $${d.sol_price}`;
            })
            .catch(() => {
                document.getElementById('api-result').innerHTML = `❌ Impossible de contacter /api/status`;
            });
    </script>
</body>
</html>
