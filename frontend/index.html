<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CryptoBot Dashboard</title>
    <style>
        body { font-family: Arial, sans-serif; background: #0a0a0a; color: white; text-align: center; padding: 100px 20px; }
        h1 { font-size: 60px; margin-bottom: 30px; }
        .big { font-size: 32px; color: #ff4444; margin: 40px 0; }
    </style>
</head>
<body>
    <h1>🚀 CryptoBot</h1>
    <p class="big">✅ VERSION FINALE - ÇA DEVRAIT MARCHER MAINTENANT</p>
    <p style="color:#888; margin-top:40px;">Si tu vois ce texte en rouge, le dashboard est bien mis à jour.</p>
    
    <div id="data" style="margin-top:60px; background:#111; padding:20px; border-radius:10px; display:inline-block; text-align:left; font-family:monospace;"></div>

    <script>
        fetch('/api/status')
            .then(r => r.json())
            .then(d => {
                document.getElementById('data').innerHTML = `
                    BTC : $${d.btc_price}<br>
                    ETH : $${d.eth_price}<br>
                    SOL : $${d.sol_price}
                `;
            });
    </script>
</body>
</html>
